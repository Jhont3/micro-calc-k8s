apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-micro
  namespace: reto5
  labels:
    app: demo-micro
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-micro
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
