apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-micro
  labels:
    app: demo-micro
  namespace: reto5
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-micro
  template:
    metadata:
      labels:
        app: demo-micro
    spec:
      containers:
        - name: demo-micro
          image: jhont3/demo-micro:1
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: demo-micro-config
